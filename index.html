<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metea | Portfolyo</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #00d4ff;
            --text: #ffffff;
            --mega-text: #ff0040;
        }
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .mega-banner {
            font-size: 120px; /* Dev boyut */
            font-weight: 900;
            color: var(--mega-text);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 50px;
            letter-spacing: -5px;
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #333;
        }
        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 5px; }
        .tagline { color: #666; margin-bottom: 30px; font-size: 1.2rem; }
        .project-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border-bottom: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="mega-banner">
    EMİRİN GÖTÜ KOCAMAN
</div>

<div class="container">
    <h1>Metea</h1>
    <p class="tagline">Developer & Modder</p>

    <div class="project-list">
        <div class="card">
            <h3>Minecraft Optimization</h3>
            <p>High FPS and PvP modules.</p>
        </div>
        <div class="card">
            <h3>Unity Dev</h3>
            <p>Weapon viewer & skin systems.</p>
        </div>
    </div>
</div>

</body>
</html>
